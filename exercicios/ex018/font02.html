<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        
        /*
            Tipos de format()
            - opentype (otf)
            - truetype(ttf)
            - ebedded-opentype
            - truetype-aat (Apple-Advanced-Typography)
            - svg
        */    
        
        @font-face {
            font-family: 'Japa' ;
            src: url('sakurata/SAKURATA.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'Japa';
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Samurai Vinny</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quae reiciendis nesciunt praesentium perspiciatis tempore voluptas tenetur deserunt incidunt facere voluptate! Numquam omnis consequatur quo earum aut necessitatibus eius tenetur iure!</p>
</body>
</html>
